{%- if cookiecutter.enable_docker and cookiecutter.use_frontend %}
# Frontend development configuration
# Usage: docker-compose -f docker-compose.frontend.yml up -d
#
# Note: Backend must be running first (docker-compose up -d)
# Frontend connects to backend via host network

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* are baked into the browser bundle at build time. The
        # browser runs on the host, so it reaches the backend on localhost.
        - NEXT_PUBLIC_API_URL=http://localhost:{{ cookiecutter.backend_port }}
        - NEXT_PUBLIC_WS_URL=ws://localhost:{{ cookiecutter.backend_port }}
        - NEXT_PUBLIC_SITE_URL=http://localhost:{{ cookiecutter.frontend_port }}
        - NEXT_PUBLIC_MAX_UPLOAD_SIZE_MB=50
{%- if cookiecutter.enable_oauth %}
        - NEXT_PUBLIC_OAUTH_PROVIDERS={% if cookiecutter.enable_oauth_google %}google{% endif %}
{%- endif %}
        - NEXT_PUBLIC_RAG_ENABLED={% if cookiecutter.enable_rag %}true{% else %}false{% endif %}
    container_name: {{ cookiecutter.project_slug }}_frontend
    ports:
      - "{{ cookiecutter.frontend_port }}:{{ cookiecutter.frontend_port }}"
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://host.docker.internal:{{ cookiecutter.backend_port }}
      - BACKEND_WS_URL=ws://host.docker.internal:{{ cookiecutter.backend_port }}
{%- if cookiecutter.enable_rag %}
      - NEXT_PUBLIC_RAG_ENABLED=true
{%- endif %}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      # The oven/bun image has no curl/wget, so probe with bun's built-in fetch.
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:{{ cookiecutter.frontend_port }}/api/health').then((r) => process.exit(r.ok ? 0 : 1), () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
{%- else %}
# Frontend is disabled for this project
{%- endif %}
